services:
  - type: web
    name: capmed-sci-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: PUBMED_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
